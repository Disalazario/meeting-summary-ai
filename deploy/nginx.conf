# nginx-конфиг для Meeting Summary AI.
# setup_vps.sh подставит __DOMAIN__ в реальный домен и установит этот файл
# в /etc/nginx/sites-enabled/meet.

# HTTP → HTTPS редирект (certbot допишет ssl-блок сам).
server {
    listen 80;
    server_name __DOMAIN__;

    # для challenge от Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name __DOMAIN__;

    # ssl_certificate и ssl_certificate_key — допишет certbot --nginx

    # Безопасность по мелочи
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Лимит загрузки — под аудио/видео совещаний
    client_max_body_size 500M;

    # ── Frontend (vite build) ──────────────────────────────────────────
    root /var/www/meet;
    index index.html;

    # SPA-роутинг: всё, что не файл — отдаём index.html
    location / {
        try_files $uri /index.html;
    }

    # Кэшируем статику долго (vite ставит хеши в имена)
    location ~* \.(js|css|woff2?|ttf|svg|png|jpg|jpeg|gif|ico)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── Mini App (если собран отдельно) ────────────────────────────────
    location /miniapp/ {
        proxy_pass http://127.0.0.1:18000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
    }

    # ── API → reverse SSH tunnel → ПК ──────────────────────────────────
    location /api/ {
        proxy_pass http://127.0.0.1:18000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Real-IP $remote_addr;

        # Долгие LLM-запросы (саммари 5–10 мин)
        proxy_read_timeout 900s;
        proxy_send_timeout 900s;

        # Для streaming-ответов если когда-то появятся
        proxy_buffering off;
    }
}
